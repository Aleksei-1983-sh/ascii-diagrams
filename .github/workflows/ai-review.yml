name: Collect PR Review

on:
  issue_comment:
    types: [created]

jobs:
  collect:
    if: contains(github.event.comment.body, '/ai-fix')
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          sudo apt update
          sudo apt install gh -y

      - name: Get PR review comments
        run: |
          gh pr view ${{ github.event.issue.number }} \
            --json comments,reviews,files > review.json

      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-review
          path: review.json
